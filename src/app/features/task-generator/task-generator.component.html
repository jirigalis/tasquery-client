<app-task-collection-drawer (load)="loadCollection($event)">
    <app-navigation [showMenu]="false"></app-navigation>

    <div class="tg-main-wrapper">
        <app-generator-header (openPro)="openProModal()"></app-generator-header>

        <app-generator-input-card
            [inputText]="inputText()"
            [loading]="loading()"
            [isInputValid]="isInputValid()"
            [currentMode]="currentMode()"
            [maxBodyLength]="maxBodyLength"
            [sampleInputLabels]="sampleInputLabels"
            (inputChange)="inputText.set($event)"
            (presetChange)="onPresetChange($event)"
            (loadSample)="loadSample($event)"
            (generate)="generateTasks()">
        </app-generator-input-card>

        @if (error()) {
            <div class="alert alert-error mt-6 shadow-lg animate__animated animate__headShake">
                <lucide-icon [img]="icons.alert"></lucide-icon>
                <span>{{ error() }}</span>
            </div>
        }

        @if (tasks() && tasks().length > 0) {
            <div class="tg-results-container animate__animated animate__fadeInUp">
                <app-generator-results-toolbar
                    [activeCollection]="activeCollection()"
                    (rename)="renameCollection()"
                    (save)="openSaveCollectionModal($event)"
                ></app-generator-results-toolbar>

                <div class="space-y-4">
                    @for (task of tasks(); track task.id) {
                        <app-task-card
                            [task]="task"
                            (saveTask)="onSaveTask($event)"
                            (deleteTask)="onDeleteTask($event)"
                        ></app-task-card>
                    }
                </div>
            </div>
        } @else {
            <app-generator-empty-state
                (action)="loadSample(sampleInputLabels[0].key)"
            ></app-generator-empty-state>
        }

        @if (activeCollection()) {
            <app-rename-collection-dialog
                #renameCollectionModal
                [collection]="activeCollection()!"
                (saved)="onRenameCollection($event)">
            </app-rename-collection-dialog>
        }

        <app-save-task-collection-dialog
            #saveCollectionModal
            (saved)="saveCollection($event)">
        </app-save-task-collection-dialog>

        <app-pro-dialog #proModal (openWaitlist)="openWaitlistModal()"></app-pro-dialog>
        <app-waitlist-modal #waitlistModal></app-waitlist-modal>

        <footer class="footer footer-center p-10 mt-10 text-base-content/30">
            <aside class="flex flex-col gap-3 items-center">
                <div class="flex flex-wrap items-center justify-center gap-4">
                    <p class="font-semibold text-xs">Tasquery © {{ year }}</p>
                    <span class="hidden sm:inline opacity-30">|</span>
                    <a href="mailto:tasquery@gmail.com" class="link link-hover flex items-center gap-1.5 hover:text-primary transition-colors text-xs">
                        <lucide-icon [img]="icons.feedback" size="12"></lucide-icon>
                        Report a Bug / Feedback
                    </a>
                </div>
                <app-terms-of-use></app-terms-of-use>
            </aside>
        </footer>
    </div>

    <div class="fixed bottom-0 left-0 -z-10 w-64 opacity-50 hidden xl:block pointer-events-none">
        <img [ngSrc]="'/taking-notes-2.svg'" width="400" height="600" alt="bg" class="w-full h-auto"/>
    </div>
    <div class="fixed bottom-0 right-0 -z-10 w-64 opacity-50 hidden xl:block pointer-events-none">
        <img [ngSrc]="'/content-structure-2.svg'" width="360" height="600" alt="bg" class="w-full h-auto" priority/>
    </div>
</app-task-collection-drawer>
