<div class="tg-empty-state animate__animated animate__fadeIn">
    <div class="tg-empty-icon-wrapper">
        <lucide-icon [img]="icons.magic" size="48"></lucide-icon>
    </div>

    <h3 class="text-xl font-bold mt-6">Ready to transform your notes?</h3>
    <p class="text-base-content/50 mt-2 max-w-xs text-center">
        Paste your meeting notes or ideas above and watch the magic happen.
    </p>

    <div class="tg-pulse-wrapper mt-10">
        <svg class="tg-curved-arrow hidden sm:block text-base-content/20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M14 9l-6 -6l-6 6" />
            <path d="M8 3v7a6 6 0 0 0 6 6h6" />
        </svg>

        <button class="btn btn-primary rounded-full px-8 tg-btn-pulse"
                (click)="action.emit()">
            <lucide-icon [img]="icons.magic" size="18"></lucide-icon>
            Try with a sample note
        </button>
    </div>
</div>
