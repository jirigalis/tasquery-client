<div class="presets-container">
    <label class="presets-label">Draft Mode: <strong class="inline sm:hidden">{{activePreset()}}</strong></label>

    <div class="presets-group">
        @for (preset of presets; track preset.id) {
            <button
                type="button"
                class="preset-btn"
                [class.active]="activePreset() === preset.id"
                (click)="selectPreset(preset.id)"
                [title]="preset.description">
                <lucide-icon [img]="preset.icon" [size]="16" class="preset-icon"></lucide-icon>
                <span class="preset-text">{{ preset.label }}</span>
            </button>
        }
    </div>

    <p class="preset-helper-text">
        {{ getActivePresetDescription() }}
    </p>
</div>
