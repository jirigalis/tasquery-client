<div class="tg-results-toolbar">
    <div class="flex flex-col gap-1">
        @if (activeCollection()) {
            <div class="tg-status-tag success">
                <lucide-icon [img]="icons.cloudCheck" size="12"></lucide-icon>
                Saved to local storage
            </div>
            <div class="flex items-center gap-2 group">
                <h2 class="tg-collection-title" (click)="rename.emit()">
                    {{ activeCollection()!.title }}
                </h2>
                <button class="btn btn-ghost btn-xs btn-circle opacity-0 group-hover:opacity-100 transition-opacity"
                        (click)="rename.emit()">
                    <lucide-icon [img]="icons.edit" size="14"></lucide-icon>
                </button>
            </div>
        } @else {
            <div class="tg-status-tag warning">Unsaved Draft</div>
            <h2 class="tg-collection-title opacity-40">New Unsaved Collection</h2>
        }
    </div>

    <div class="flex gap-2 w-full sm:w-auto">
        @if (activeCollection()) {
            <button class="btn btn-outline btn-sm flex-1 sm:flex-none gap-2" (click)="save.emit(true)">
                <lucide-icon [img]="icons.copy" size="16"></lucide-icon>
                Duplicate
            </button>
        } @else {
            <button class="btn btn-primary btn-sm flex-1 sm:flex-none gap-2 shadow-sm" (click)="save.emit(false)">
                <lucide-icon [img]="icons.save" size="16"></lucide-icon>
                Save Collection
            </button>
        }
    </div>
</div>
