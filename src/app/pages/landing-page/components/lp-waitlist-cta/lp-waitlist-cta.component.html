<!-- Waitlist CTA -->
<section id="waitlist" class="py-20 px-6 text-center">
    <h2 class="text-3xl font-bold mb-4">Stop writing tickets manually.</h2>
    <p class="mb-6 max-w-xl mx-auto">Get early access to direct Jira integrations, unlimited context, cloud sync, and custom templates.</p>

    <div class="flex flex-col justify-center gap-6 w-full sm:flex-row sm:w-auto">
        <div class="tq-cta-wrapper hover:scale-105 transition-transform">
            <a href="/app" class="btn btn-primary btn-lg w-full sm:w-auto">
                <lucide-icon [img]="tubeIcon" class="mr-1"></lucide-icon>
                Try Tasquery For Free
            </a>
            <span class="tq-cta-helper">No login required</span>
        </div>
        <button class="btn btn-primary btn-lg px-8 text-lg hover:scale-105 transition-transform shadow-lg"
                (click)="showWaitlistModal()">
            Join the Waitlist
        </button>
    </div>

    <app-waitlist-modal #waitlistModal></app-waitlist-modal>
</section>
